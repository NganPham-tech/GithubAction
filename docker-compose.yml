services:
  app-java:
    build: .
    image: ptaingan/phamthiaingan-app:2.0
    ports:
      - "8080:8080"
    depends_on:
      - db-mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/demo_docker_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
    networks:
      - demo-network

  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_docker_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - demo-network

volumes:
  db_data:

networks:
  demo-network:
    driver: bridge
