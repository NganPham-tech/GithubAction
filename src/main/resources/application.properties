spring.application.name=phamthiaingan

# Cấu hình Database: Sử dụng H2 làm mặc định khi chạy local, MySQL khi chạy trong Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:demo_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# 2. Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}