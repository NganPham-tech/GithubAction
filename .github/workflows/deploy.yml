name: CI/CD Docker Hub

# 1. Kịch bản chạy khi có hành động push vào nhánh master
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 2. Action lấy code từ GitHub (Checkout)
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 3. Action Đăng nhập Docker Hub
      # Sử dụng GitHub Secrets để bảo mật tài khoản
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4. Action Đóng gói & Đẩy Image (Build and Push)
      # Tên image sẽ có định dạng: <tên_user_docker>/phamthiaingan:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/phamthiaingan:v${{ github.run_number }}
